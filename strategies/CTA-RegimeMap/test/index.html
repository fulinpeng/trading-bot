<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
        }
        #chart {
            width: 100%;
            height: 700px;
            margin-bottom: 20px;
        }
        #profitChart {
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
        }
        #profitPercentChart {
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
        }
        #lossPercentChart {
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
        }
        #consecutiveLossChart {
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
        }
        #orderAmountChart {
            width: 100%;
            height: 400px;
        }
        .info-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            max-width: 300px;
            z-index: 1000;
        }
        .info-item {
            margin: 5px 0;
        }
        .info-label {
            color: #888;
        }
        .info-value {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="info-panel" id="infoPanel">
        <div class="info-item">
            <span class="info-label">Symbol:</span>
            <span class="info-value">{{symbol}}</span>
        </div>
        <div class="info-item">
            <span class="info-label">TimeLevel:</span>
            <span class="info-value">{{timeLevel}}</span>
        </div>
        <div class="info-item">
            <span class="info-label">K线数量:</span>
            <span class="info-value" id="klineCount">0</span>
        </div>
        <div class="info-item" style="margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
            <span class="info-label" style="font-weight: bold; color: #fff;">统计信息</span>
        </div>
        <div class="info-item">
            <span class="info-label">总开单数:</span>
            <span class="info-value" id="totalTrades">0</span>
        </div>
        <div class="info-item">
            <span class="info-label">盈利数量:</span>
            <span class="info-value" id="winCount" style="color: #00ff00;">0</span>
        </div>
        <div class="info-item">
            <span class="info-label">失败数量:</span>
            <span class="info-value" id="lossCount" style="color: #ff0000;">0</span>
        </div>
        <div class="info-item">
            <span class="info-label">胜率:</span>
            <span class="info-value" id="winRate">0%</span>
        </div>
        <div class="info-item">
            <span class="info-label">平均盈亏比:</span>
            <span class="info-value" id="profitLossRatio">0.00</span>
        </div>
    </div>
    
    <div id="chart"></div>
    <div id="profitChart"></div>
    <div id="configPanel" style="margin: 20px 0; padding: 20px; background-color: #2a2a2a; border-radius: 8px;">
        <h3 style="color: #fff; margin-bottom: 15px;">策略配置 (config.js)</h3>
        <pre id="configContent" style="color: #98f0b0; background-color: #1a1a1a; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 12px; line-height: 1.5; margin: 0;"></pre>
    </div>
    <div id="profitPercentChart"></div>
    <div id="lossPercentChart"></div>
    <div id="consecutiveLossChart"></div>
    <div id="orderAmountChart"></div>

    <script>
        const chart = echarts.init(document.getElementById('chart'));
        const profitChart = echarts.init(document.getElementById('profitChart'));
        const profitPercentChart = echarts.init(document.getElementById('profitPercentChart'));
        const lossPercentChart = echarts.init(document.getElementById('lossPercentChart'));
        const consecutiveLossChart = echarts.init(document.getElementById('consecutiveLossChart'));
        const orderAmountChart = echarts.init(document.getElementById('orderAmountChart'));

        const upColor = "#98f0b0";
        const upBorderColor = "#98f0b0";
        const downColor = "#f19f9f";
        const downBorderColor = "#f19f9f";

        const symbol = '{{symbol}}';
        const timeLevel = '{{timeLevel}}';
        const kLineData = {{kLineData}};
        const indicators = {{indicators}};
        const openHistory = {{openHistory}};
        const closeHistory = {{closeHistory}};
        const openPriceHistory = {{openPriceHistory}};
        const closePriceHistory = {{closePriceHistory}};
        const orderPriceForCloseHistory = {{orderPriceForCloseHistory}};
        const initialStopLossHistory = {{initialStopLossHistory}} || [];
        const orderAmountHistory = {{orderAmountHistory}};
        const trendHistory = {{trendHistory}};
        const curTestMoneyHistory = {{curTestMoneyHistory}};
        const configData = {{configData}} || {};
        // 从指标数组中提取数据
        const superTrendArr = indicators.superTrendArr || [];
        // console.log('superTrendArr:', superTrendArr);
        const sslArr = indicators.sslArr || [];
        // console.log('sslArr:', sslArr);
        const ssl2Arr = indicators.ssl2Arr || [];
        // console.log('ssl2Arr:', ssl2Arr);
        const fibArr = indicators.fibArr || [];
        // console.log('fibArr:', fibArr);
        const swimingFreeArr = indicators.swimingFreeArr || [];
        // console.log('swimingFreeArr:', swimingFreeArr);
        const qqeModArr = indicators.qqeModArr || [];
        // console.log('qqeModArr:', qqeModArr);
        const adxArr = indicators.adxArr || [];
        // console.log('adxArr:', adxArr);
        const preHighLowArr = indicators.preHighLowArr || [];
        // console.log('preHighLowArr:', preHighLowArr);
        const ssl55Arr = indicators.ssl55Arr || [];
        const squeezeBoxArr = indicators.squeezeBoxArr || [];
        const atrZArr = indicators.atrZArr || [];

        // 计算统计信息
        function calculateStatistics() {
            const totalTrades = openHistory.length;
            if (totalTrades === 0) {
                return {
                    totalTrades: 0,
                    winCount: 0,
                    lossCount: 0,
                    winRate: 0,
                    profitLossRatio: 0,
                    tradeProfitLossRatios: [],
                    consecutiveLossStats: {}
                };
            }

            // 计算每笔交易的盈亏
            const profits = [];
            const losses = [];
            const tradeProfits = []; // 每笔交易的盈亏金额（正数表示盈利，负数表示亏损）
            
            for (let i = 0; i < totalTrades; i++) {
                const openPrice = orderPriceForCloseHistory[i];
                const closePrice = closePriceHistory[i];
                const trend = trendHistory[i];
                
                if (openPrice && closePrice && trend) {
                    let profit = 0;
                    if (trend === 'up') {
                        // 做多：盈亏 = 平仓价 - 开仓价
                        profit = closePrice - openPrice;
                    } else if (trend === 'down') {
                        // 做空：盈亏 = 开仓价 - 平仓价
                        profit = openPrice - closePrice;
                    }
                    
                    tradeProfits.push(profit);
                    
                    if (profit > 0) {
                        profits.push(profit);
                    } else if (profit < 0) {
                        losses.push(Math.abs(profit)); // 亏损转为正数
                    }
                }
            }

            const winCount = profits.length;
            const lossCount = losses.length;
            const winRate = totalTrades > 0 ? (winCount / totalTrades * 100) : 0;
            
            // 计算平均盈亏比：平均盈利 / 平均亏损
            const avgProfit = profits.length > 0 ? profits.reduce((a, b) => a + b, 0) / profits.length : 0;
            const avgLoss = losses.length > 0 ? losses.reduce((a, b) => a + b, 0) / losses.length : 0;
            const profitLossRatio = avgLoss > 0 ? (avgProfit / avgLoss) : (avgProfit > 0 ? Infinity : 0);

            // 计算每笔交易的盈亏比
            // 盈亏比 = 盈利金额 / 平均亏损（如果盈利），或 -亏损金额 / 平均盈利（如果亏损）
            const tradeProfitLossRatios = [];
            for (let i = 0; i < tradeProfits.length; i++) {
                const profit = tradeProfits[i];
                let ratio = 0;
                if (profit > 0 && avgLoss > 0) {
                    // 盈利：盈亏比 = 盈利金额 / 平均亏损
                    ratio = profit / avgLoss;
                } else if (profit < 0 && avgProfit > 0) {
                    // 亏损：盈亏比 = -亏损金额 / 平均盈利（负数表示亏损）
                    ratio = profit / avgProfit;
                } else if (profit > 0 && avgLoss === 0) {
                    // 只有盈利，没有亏损
                    ratio = Infinity;
                }
                tradeProfitLossRatios.push(ratio);
            }

            // 计算连续亏损次数统计
            const consecutiveLossStats = {};
            let currentConsecutiveLoss = 0;
            
            for (let i = 0; i < tradeProfits.length; i++) {
                if (tradeProfits[i] < 0) {
                    // 亏损
                    currentConsecutiveLoss++;
                } else {
                    // 盈利，记录之前的连续亏损次数
                    if (currentConsecutiveLoss > 0) {
                        const key = currentConsecutiveLoss.toString();
                        consecutiveLossStats[key] = (consecutiveLossStats[key] || 0) + 1;
                        currentConsecutiveLoss = 0;
                    }
                }
            }
            // 处理最后一段连续亏损
            if (currentConsecutiveLoss > 0) {
                const key = currentConsecutiveLoss.toString();
                consecutiveLossStats[key] = (consecutiveLossStats[key] || 0) + 1;
            }

            return {
                totalTrades,
                winCount,
                lossCount,
                winRate,
                profitLossRatio,
                tradeProfitLossRatios,
                consecutiveLossStats
            };
        }

        const stats = calculateStatistics();

        // 更新信息面板
        document.getElementById('klineCount').textContent = kLineData.length;
        document.getElementById('totalTrades').textContent = stats.totalTrades;
        document.getElementById('winCount').textContent = stats.winCount;
        document.getElementById('lossCount').textContent = stats.lossCount;
        document.getElementById('winRate').textContent = stats.winRate.toFixed(2) + '%';
        document.getElementById('profitLossRatio').textContent = stats.profitLossRatio === Infinity ? '∞' : stats.profitLossRatio.toFixed(2);

        // 处理K线数据
        function splitData(rawData) {
            const categoryData = [];
            const values = [];
            for (let i = 0; i < rawData.length; i++) {
                categoryData.push(rawData[i].openTime);
                values.push([
                    parseFloat(rawData[i].open),
                    parseFloat(rawData[i].close),
                    parseFloat(rawData[i].low),
                    parseFloat(rawData[i].high),
                ]);
            }
            return {
                categoryData: categoryData,
                values: values,
            };
        }

        const data0 = splitData(kLineData);
        
        // K线数据和指标数据已经一一对应（都从日志系统中push），不需要对齐
        // 直接使用指标数组
        const alignedSuperTrendArr = superTrendArr;
        const alignedSslArr = sslArr;
        const alignedSsl2Arr = ssl2Arr;
        const alignedFibArr = fibArr;
        const alignedSwimingFreeArr = swimingFreeArr;
        const alignedQqeModArr = qqeModArr;
        const alignedAdxArr = adxArr;
        const alignedSsl55Arr = ssl55Arr;
        const alignedSqueezeBoxArr = squeezeBoxArr;
        const alignedPreHighLowArr = preHighLowArr;
        const alignedAtrZArr = atrZArr;

        // 从指标数组中提取数据
        function extractValue(arr, valuePath) {
            return arr.map((item) => {
                if (!item) return null;
                const val = valuePath.split('.').reduce((obj, key) => obj && obj[key], item);
                return val !== undefined && val !== null ? val : null;
            });
        }

        // SuperTrend
        const superTrendUp = extractValue(alignedSuperTrendArr, 'up');
        const superTrendDown = extractValue(alignedSuperTrendArr, 'dn');
        const superTrendATR = extractValue(alignedSuperTrendArr, 'atr');

        // SSL
        const sslUp = extractValue(alignedSslArr, 'sslUp');
        const sslDown = extractValue(alignedSslArr, 'sslDown');

        // SSL2
        const ssl2Up = extractValue(alignedSsl2Arr, 'sslUp2');
        const ssl2Down = extractValue(alignedSsl2Arr, 'sslDown2');

        // Fibonacci
        const fibUpper = extractValue(alignedFibArr, 'upper_7');
        const fibLower = extractValue(alignedFibArr, 'lower_7');

        // PreHighLow
        const preHigh = extractValue(alignedPreHighLowArr, 'preHigh');
        const preLow = extractValue(alignedPreHighLowArr, 'preLow');

        // Range Filter (swimingFree)
        const swimingFilt = extractValue(alignedSwimingFreeArr, 'filt');
        const swimingHiBand = extractValue(alignedSwimingFreeArr, 'hiBand');
        const swimingLoBand = extractValue(alignedSwimingFreeArr, 'loBand');

        // QQE MOD
        const qqeModBar = extractValue(alignedQqeModArr, 'qqeModBar0');

        // ADX
        const adxValue = extractValue(alignedAdxArr, 'ADX');
        const diPlus = extractValue(alignedAdxArr, 'DIPlus0');
        const diMinus = extractValue(alignedAdxArr, 'DIMinus0');

        // Squeeze Box
        const squeezeBoxBasis = extractValue(alignedSqueezeBoxArr, 'basis');
        const squeezeBoxBh = extractValue(alignedSqueezeBoxArr, 'bh');
        const squeezeBoxBl = extractValue(alignedSqueezeBoxArr, 'bl');

        // SSL55
        const ssl55Value = extractValue(alignedSsl55Arr, 'ssl55');

        // 计算ATR平均值
        const validATRValues = superTrendATR.filter(val => val !== null && val !== undefined);
        const avgATR = validATRValues.length > 0 
            ? validATRValues.reduce((a, b) => a + b, 0) / validATRValues.length 
            : null;

        // 创建开仓/平仓标记
        const markArea = [];
        const markPointData = [];
        const markLineData = [];

        // 先遍历开仓记录，显示开仓点
        for (let i = 0; i < openHistory.length; i++) {
            const openTime = openHistory[i];
            const openPrice = openPriceHistory[i];
            const trend = trendHistory[i];
            
            if (openTime && openPrice) {
                const openIdx = data0.categoryData.indexOf(openTime);
                if (openIdx >= 0) {
                    const markColor = trend === 'up' ? '#00ff00' : '#ff0000';
                    markPointData.push({
                        name: "开仓",
                        coord: [openIdx, openPrice],
                        value: "",
                        itemStyle: {
                            color: markColor,
                        },
                        symbol: 'arrow',  // 使用箭头标记
                        symbolSize: 15,
                        symbolRotate: trend === 'up' ? 0 : 180,  // 多单向上，空单向下
                    });
                }
            }
        }

        // 遍历所有平仓记录，显示每个平仓点（包括部分平仓）
        // 使用 orderPriceForCloseHistory 来获取每个平仓对应的开仓价格
        // 找到每个平仓对应的开仓记录（用于获取 trend 和 openTime）
        let openIndex = 0; // 当前对应的开仓索引
        for (let i = 0; i < closeHistory.length; i++) {
            const closeTime = closeHistory[i];
            const closePrice = closePriceHistory[i];
            const orderPrice = orderPriceForCloseHistory[i]; // 每个平仓对应的开仓价格
            
            if (!closeTime || closePrice === null || closePrice === undefined || orderPrice === null || orderPrice === undefined) continue;
            
            // 找到对应的开仓记录（用于获取 trend 和 openTime）
            let matchedOpenIndex = openIndex;
            
            // 如果当前平仓索引小于开仓索引，说明这是部分平仓，使用当前开仓索引
            if (i < openHistory.length) {
                matchedOpenIndex = Math.min(i, openHistory.length - 1);
            } else {
                // 如果平仓记录多于开仓记录，说明有多次部分平仓
                // 找到时间上最近的开仓（最后一个开仓）
                matchedOpenIndex = openHistory.length - 1;
            }
            
            // 确保索引有效
            if (matchedOpenIndex >= 0 && matchedOpenIndex < openHistory.length) {
                const openTime = openHistory[matchedOpenIndex];
                const trend = trendHistory[matchedOpenIndex];
                
                if (openTime) {
                    const openIdx = data0.categoryData.indexOf(openTime);
                    const closeIdx = data0.categoryData.indexOf(closeTime);
                    
                    if (openIdx >= 0 && closeIdx >= 0) {
                        // 使用 orderPriceForCloseHistory 中的开仓价格计算盈亏
                        const profit = trend === 'up' 
                            ? (closePrice - orderPrice) 
                            : (orderPrice - closePrice);
                        const markColor = trend === 'up' ? '#00ff00' : '#ff0000';
                        
                        // 显示平仓点（每次平仓都显示）
                        markPointData.push({
                            name: "平仓",
                            coord: [closeIdx, closePrice],
                            value: profit.toFixed(2),
                            itemStyle: {
                                color: markColor,
                            },
                            symbol: 'pin',
                            symbolSize: 10,
                        });
                        
                        // 如果是第一次平仓这个开仓（i === matchedOpenIndex），显示标记区域
                        if (i === matchedOpenIndex) {
                            markArea.push([
                                {
                                    coord: [openIdx, orderPrice],
                                    itemStyle: {
                                        color: trend === 'up' ? 'rgba(0, 255, 0, 0.1)' : 'rgba(255, 0, 0, 0.1)',
                                    },
                                },
                                {
                                    coord: [closeIdx, closePrice],
                                },
                            ]);
                        }
                    }
                }
            }
            
            // 如果这是最后一次平仓这个开仓，移动到下一个开仓
            if (i === openIndex && openIndex < openHistory.length - 1) {
                openIndex++;
            }
        }

        // K线图配置
        const option = {
            title: {
                text: `K线图与指标`,
                left: 0,
                textStyle: {
                    color: '#fff',
                },
            },
            tooltip: {
                trigger: "axis",
                axisPointer: {
                    type: "cross",
                },
                formatter: function (params) {
                    let result = `<div style="margin-bottom: 5px;"><strong>${params[0].axisValue}</strong></div>`;
                    
                    params.forEach(function (item) {
                        if (item.seriesName === "K线" && item.value !== null && item.value !== undefined) {
                            // K线数据格式：[open, close, low, high]
                            const klineData = item.value;
                            if (Array.isArray(klineData) && klineData.length >= 4) {
                                result += `<div>open: <span style="color: ${item.color}">${klineData[0].toFixed(4)}</span></div>`;
                                result += `<div>close: <span style="color: ${item.color}">${klineData[1].toFixed(4)}</span></div>`;
                                result += `<div>low: <span style="color: ${item.color}">${klineData[2].toFixed(4)}</span></div>`;
                                result += `<div>high: <span style="color: ${item.color}">${klineData[3].toFixed(4)}</span></div>`;
                            }
                        }
                    });
                    
                    // 添加指标信息
                    const idx = params[0].dataIndex;
                    const superTrend = alignedSuperTrendArr[idx];
                    const ssl = alignedSslArr[idx];
                    const swimingFree = alignedSwimingFreeArr[idx];
                    const qqeMod = alignedQqeModArr[idx];
                    const adx = alignedAdxArr[idx];
                    const fib = alignedFibArr[idx];
                    const ssl55 = alignedSsl55Arr[idx];
                    const squeezeBox = alignedSqueezeBoxArr[idx];
                    const preHighLow = alignedPreHighLowArr[idx];
                    
                    if (superTrend || ssl || swimingFree || qqeMod || adx || fib || ssl55 || squeezeBox || preHighLow) {
                        result += '<div style="margin-top: 10px; border-top: 1px solid #333; padding-top: 5px;">';
                        result += '<strong>指标详情:</strong><br>';
                        if (superTrend) {
                            const trendValue = superTrend.trend;
                            const trendText = trendValue === 1 ? 'UP' : trendValue === -1 ? 'DOWN' : 'N/A';
                            const trendColor = trendValue === 1 ? '#00ff00' : trendValue === -1 ? '#ff0000' : '#888';
                            result += `SuperTrend Trend: <span style="color: ${trendColor}">${trendText} (${trendValue})</span><br>`;
                            if (superTrend.up !== null && superTrend.up !== undefined) {
                                result += `SuperTrend UP: ${superTrend.up.toFixed(4)}<br>`;
                            }
                            if (superTrend.dn !== null && superTrend.dn !== undefined) {
                                result += `SuperTrend DN: ${superTrend.dn.toFixed(4)}<br>`;
                            }
                            if (superTrend.atr !== null && superTrend.atr !== undefined) {
                                result += `SuperTrend ATR: ${superTrend.atr.toFixed(4)}<br>`;
                            }
                        }
                        if (alignedAtrZArr && alignedAtrZArr[idx] !== null && alignedAtrZArr[idx] !== undefined) {
                            const atrZ = alignedAtrZArr[idx];
                            let atrZStatus = '';
                            if (atrZ < -1) {
                                atrZStatus = '压缩行情';
                            } else if (atrZ > 1) {
                                atrZStatus = '极端波动';
                            } else {
                                atrZStatus = '正常行情';
                            }
                            result += `ATR Z-Score: ${atrZ.toFixed(4)} (${atrZStatus})<br>`;
                        }
                        // if (ssl) {
                        //     result += `SSL: ${ssl.hlv === 1 ? 'UP' : 'DOWN'}<br>`;
                        // }
                        // if (swimingFree) {
                        //     result += `Range Filter: ${swimingFree.trend || 'N/A'}<br>`;
                        // }
                        if (qqeMod) {
                            result += `QQE MOD: ${qqeMod.qqeModBar0?.toFixed(2) || 'N/A'}<br>`;
                        }
                        if (adx) {
                            result += `ADX: ${adx.ADX?.toFixed(2) || 'N/A'}, `;
                            result += `DI+: ${adx.DIPlus0?.toFixed(2) || 'N/A'}, DI-: ${adx.DIMinus0?.toFixed(2) || 'N/A'}<br>`;
                        }
                        if (fib) {
                            result += `Fib Upper: ${fib.upper_7?.toFixed(2) || 'N/A'}, Lower: ${fib.lower_7?.toFixed(2) || 'N/A'}<br>`;
                        }
                        // if (ssl55) {
                        //     result += `SSL55: ${ssl55.ssl55 !== null && ssl55.ssl55 !== undefined ? ssl55.ssl55.toFixed(4) : 'N/A'}<br>`;
                        //     if (ssl55.hh !== null && ssl55.hh !== undefined) {
                        //         result += `SSL55 HH: ${ssl55.hh.toFixed(4)}<br>`;
                        //     }
                        //     if (ssl55.ll !== null && ssl55.ll !== undefined) {
                        //         result += `SSL55 LL: ${ssl55.ll.toFixed(4)}<br>`;
                        //     }
                        // }
                        if (squeezeBox) {
                            result += `Squeeze Box 上轨: ${squeezeBox.bh !== null && squeezeBox.bh !== undefined ? squeezeBox.bh.toFixed(4) : 'N/A'}<br>`;
                            result += `Squeeze Box 下轨: ${squeezeBox.bl !== null && squeezeBox.bl !== undefined ? squeezeBox.bl.toFixed(4) : 'N/A'}<br>`;
                            if (squeezeBox.basis !== null && squeezeBox.basis !== undefined) {
                                result += `Squeeze Box 中线: ${squeezeBox.basis.toFixed(4)}<br>`;
                            }
                        }
                        if (preHighLow) {
                            if (preHighLow.preHigh !== null && preHighLow.preHigh !== undefined) {
                                result += `摆动高: ${preHighLow.preHigh.toFixed(4)}<br>`;
                            }
                            if (preHighLow.preLow !== null && preHighLow.preLow !== undefined) {
                                result += `摆动低: ${preHighLow.preLow.toFixed(4)}<br>`;
                            }
                        }
                        result += '</div>';
                    }
                    return result;
                },
            },
            legend: {
                data: [
                    "K线",
                    "SuperTrend UP",
                    "SuperTrend DN",
                    "SSL Up",
                    "SSL Down",
                    "SSL2 Up",
                    "SSL2 Down",
                    "Fib Upper",
                    "Fib Lower",
                    "Range Filter",

                    });
                    return result;
                },
            },
            grid: {
                left: "3%",
                right: "4%",
                bottom: "15%",
            },
            xAxis: {
                type: "category",
                data: profitPercentXAxis,
                boundaryGap: false,
                axisLabel: {
                    color: '#999',
                },
            },
            yAxis: {
                type: "value",
                scale: true,
                min: profitAxisMin,
                max: profitAxisMax,
                splitArea: {
                    show: false,
                },
                axisLine: {
                    show: false,
                },
                axisLabel: {
                    color: '#999',
                    formatter: function (value) {
                        return (value * 100).toFixed(2) + '%';
                    },
                },
                splitLine: {
                    show: true,
                    lineStyle: {
                        color: '#34384980',
                    },
                },
            },
            dataZoom: [
                {
                    type: "inside",
                    start: 50,
                    end: 100,
                },
                {
                    show: true,
                    type: "slider",
                    top: "85%",
                    start: 50,
                    end: 100,
                    textStyle: {
                        color: '#999',
                    },
                },
            ],
            series: [
                {
                    name: "真实盈利百分比",
                    type: "line",
                    data: realProfitPercentData,
                    smooth: false,
                    step: false,
                    connectNulls: false,
                    symbol: "none",
                    lineStyle: {
                        color: "#98f0b0",
                        width: 2,
                        type: "solid",
                    },
                    markLine: avgProfitPercent != null ? {
                        data: [
                            {
                                yAxis: avgProfitPercent,
                                lineStyle: { color: '#ffff00', type: 'dashed', width: 2 },
                                label: {
                                    formatter: '平均: ' + (avgProfitPercent * 100).toFixed(2) + '%',
                                    position: 'middle',
                                    color: '#ffff00',
                                },
                            },
                        ],
                    } : null,
                },
            ],
        };

        profitPercentChart.setOption(profitPercentOption);

        // 真实亏损百分比曲线图：用 curTestMoneyHistory 判断盈亏，盈利为 null，亏损为 亏损值/原始本金
        const initialCapital = 10000; // 原始本金固定为 10000
        const closeCount = curTestMoneyHistory && curTestMoneyHistory.length ? curTestMoneyHistory.length : 0;
        const realLossPercentData = [];
        const lossPercentXAxis = [];
        for (let i = 0; i < closeCount; i++) {
            lossPercentXAxis.push(i + 1);
            const cur = curTestMoneyHistory[i];
            if (i === 0) {
                // 第 0 次：curTestMoneyHistory[0] > 0 为盈利
                if (cur == null || cur > 0) {
                    realLossPercentData.push(null);
                } else {
                    const lossAmount = initialCapital - cur;
                    realLossPercentData.push(lossAmount < 0 ? lossAmount / initialCapital : null);
                }
            } else {
                const prev = curTestMoneyHistory[i - 1];
                if (prev == null || cur == null) {
                    realLossPercentData.push(null);
                } else if (cur > prev) {
                    realLossPercentData.push(null); // 盈利
                } else {
                    const lossAmount = prev - cur;
                    realLossPercentData.push(lossAmount / initialCapital);
                }
            }
        }
        // 亏损图纵轴根据实际数据自适应，并求平均值用于标线
        const validLossPercents = realLossPercentData.filter(v => v != null);
        const avgLossPercent = validLossPercents.length > 0
            ? validLossPercents.reduce((a, b) => a + b, 0) / validLossPercents.length
            : null;
        const lossYMin = validLossPercents.length ? Math.min(...validLossPercents) : 0;
        const lossYMax = validLossPercents.length ? Math.max(...validLossPercents) : 0.01;
        const lossYPadding = validLossPercents.length > 1 ? (lossYMax - lossYMin) * 0.1 : 0.01;
        const lossAxisMin = Math.max(0, lossYMin - lossYPadding);
        const lossAxisMax = lossYMax + lossYPadding;

        const lossPercentOption = {
            title: {
                text: "真实亏损百分比曲线（亏损值/原始本金，盈利为无）",
                left: 0,
                textStyle: {
                    color: '#fff',
                },
            },
            tooltip: {
                trigger: "axis",
                axisPointer: {
                    type: "cross",
                    label: {
                        backgroundColor: '#6a7985',
                    },
                },
                formatter: function (params) {
                    const dataIndex = params[0].dataIndex;
                    const index = dataIndex;
                    const closeTime = closeHistory[index] || 'N/A';
                    const openPrice = orderPriceForCloseHistory[index] != null ? orderPriceForCloseHistory[index].toFixed(4) : 'N/A';
                    const closePrice = closePriceHistory[index] != null ? closePriceHistory[index].toFixed(4) : 'N/A';
                    let result = `<div><strong>第 ${index + 1} 笔</strong></div>`;
                    result += `<div>时间: ${closeTime}</div>`;
                    result += `<div>开仓价格: ${openPrice}</div>`;
                    result += `<div>平仓价格: ${closePrice}</div>`;
                    params.forEach(function (item) {
                        if (item.value !== null && item.value !== undefined) {
                            result += `<div>${item.seriesName}: <span style="color: #f19f9f">${(item.value * 100).toFixed(2)}%</span></div>`;
                        } else {
                            result += `<div>${item.seriesName}: <span style="color: #98f0b0">盈利</span></div>`;
                        }
                    });
                    return result;
                },
            },
            grid: {
                left: "3%",
                right: "4%",
                bottom: "15%",
            },
            xAxis: {
                type: "category",
                data: lossPercentXAxis,
                boundaryGap: false,
                axisLabel: {
                    color: '#999',
                },
            },
            yAxis: {
                type: "value",
                scale: true,
                min: lossAxisMin,
                max: lossAxisMax,
                splitArea: {
                    show: false,
                },
                axisLine: {
                    show: false,
                },
                axisLabel: {
                    color: '#999',
                    formatter: function (value) {
                        return (value * 100).toFixed(2) + '%';
                    },
                },
                splitLine: {
                    show: true,
                    lineStyle: {
                        color: '#34384980',
                    },
                },
            },
            dataZoom: [
                {
                    type: "inside",
                    start: 50,
                    end: 100,
                },
                {
                    show: true,
                    type: "slider",
                    top: "85%",
                    start: 50,
                    end: 100,
                    textStyle: {
                        color: '#999',
                    },
                },
            ],
            series: [
                {
                    name: "真实亏损百分比",
                    type: "line",
                    data: realLossPercentData,
                    smooth: false,
                    step: false,
                    connectNulls: false,
                    symbol: "none",
                    lineStyle: {
                        color: "#f19f9f",
                        width: 2,
                        type: "solid",
                    },
                    markLine: avgLossPercent != null ? {
                        data: [
                            {
                                yAxis: avgLossPercent,
                                lineStyle: { color: '#ffff00', type: 'dashed', width: 2 },
                                label: {
                                    formatter: '平均: ' + (avgLossPercent * 100).toFixed(2) + '%',
                                    position: 'middle',
                                    color: '#ffff00',
                                },
                            },
                        ],
                    } : null,
                },
            ],
        };

        lossPercentChart.setOption(lossPercentOption);

        // 连续亏损次数统计图
        const consecutiveLossData = [];
        const consecutiveLossLabels = [];
        
        // 获取所有连续亏损次数，按次数排序
        const lossCounts = Object.keys(stats.consecutiveLossStats).map(Number).sort((a, b) => a - b);
        
        for (let i = 0; i < lossCounts.length; i++) {
            const count = lossCounts[i];
            consecutiveLossLabels.push(`连续亏损${count}次`);
            consecutiveLossData.push(stats.consecutiveLossStats[count.toString()]);
        }

        const consecutiveLossOption = {
            title: {
                text: "连续亏损次数统计",
                left: 0,
                textStyle: {
                    color: '#fff',
                },
            },
            tooltip: {
                trigger: "axis",
                axisPointer: {
                    type: "shadow",
                },
                formatter: function (params) {
                    let result = `<div><strong>${params[0].axisValue}</strong></div>`;
                    params.forEach(function (item) {
                        result += `<div>${item.seriesName}: <span style="color: #ff0000">${item.value}</span></div>`;
                    });
                    return result;
                },
            },
            grid: {
                left: "3%",
                right: "4%",
                bottom: "15%",
            },
            xAxis: {
                type: "category",
                data: consecutiveLossLabels,
                axisLabel: {
                    color: '#999',
                    rotate: 45, // 旋转标签以避免重叠
                },
            },
            yAxis: {
                type: "value",
                splitArea: {
                    show: false,
                },
                axisLine: {
                    show: false,
                },
                axisLabel: {
                    color: '#999',
                },
                splitLine: {
                    show: true,  // 显示Y轴分割线
                    lineStyle: {
                        color: '#34384980',  // 白色，透明度80%
                    },
                },
            },
            series: [
                {
                    name: "出现次数",
                    type: "bar",
                    data: consecutiveLossData,
                    itemStyle: {
                        color: "#ff0000",
                    },
                    label: {
                        show: true,
                        position: "top",
                        color: "#fff",
                    },
                },
            ],
        };

        consecutiveLossChart.setOption(consecutiveLossOption);

        // 订单金额曲线图
        const orderAmountData = [];
        const orderAmountTimes = [];
        
        // 构建订单金额曲线数据：每个开仓对应一个数据点
        // 直接使用已计算的订单金额
        for (let i = 0; i < orderAmountHistory.length; i++) {
            orderAmountTimes.push(i); // 横轴为索引（与盈利曲线图一致）
            orderAmountData.push(orderAmountHistory[i] || 0);
        }
        
        // 计算平均订单金额（排除 0 和 null）
        const validOrderAmounts = orderAmountHistory.filter(a => a !== null && a !== undefined && a > 0);
        const avgOrderAmount = validOrderAmounts.length > 0 
            ? validOrderAmounts.reduce((a, b) => a + b, 0) / validOrderAmounts.length 
            : 0;

        const orderAmountOption = {
            title: {
                text: "订单金额曲线",
                left: 0,
                textStyle: {
                    color: '#fff',
                },
            },
            tooltip: {
                trigger: "axis",
                axisPointer: {
                    type: "cross",
                    label: {
                        backgroundColor: '#6a7985',
                    },
                },
                formatter: function (params) {
                    const index = params[0].dataIndex;
                    const openTime = openHistory[index] || 'N/A';
                    const openPrice = orderPriceForCloseHistory[index] !== null && orderPriceForCloseHistory[index] !== undefined 
                        ? orderPriceForCloseHistory[index].toFixed(4) 
                        : 'N/A';
                    const orderAmount = orderAmountHistory[index] !== null && orderAmountHistory[index] !== undefined 
                        ? orderAmountHistory[index].toFixed(2) 
                        : 'N/A';
                    let result = `<div><strong>开仓 #${index}</strong></div>`;
                    result += `<div>时间: ${openTime}</div>`;
                    result += `<div>开仓价格: ${openPrice}</div>`;
                    params.forEach(function (item) {
                        result += `<div>${item.seriesName}: <span style="color: #ffff00">${item.value.toFixed(2)}</span></div>`;
                    });
                    return result;
                },
            },
            grid: {
                left: "3%",
                right: "4%",
                bottom: "15%",
            },
            xAxis: {
                type: "category",
                data: orderAmountTimes,
                boundaryGap: false,
                axisLabel: {
                    color: '#999',
                },
            },
            yAxis: {
                type: "value",
                splitArea: {
                    show: false,
                },
                axisLine: {
                    show: false,
                },
                axisLabel: {
                    color: '#999',
                    formatter: function (value) {
                        return value.toFixed(2);
                    },
                },
                splitLine: {
                    show: true,  // 显示Y轴分割线
                    lineStyle: {
                        color: '#34384980',  // 白色，透明度80%
                    },
                },
            },
            dataZoom: [
                {
                    type: "inside",
                    start: 50,
                    end: 100,
                },
                {
                    show: true,
                    type: "slider",
                    top: "85%",
                    start: 50,
                    end: 100,
                    textStyle: {
                        color: '#999',
                    },
                },
            ],
            series: [
                {
                    name: "订单金额",
                    type: "line",
                    data: orderAmountData,
                    smooth: false,
                    step: false,
                    connectNulls: false,
                    symbol: "none",
                    lineStyle: {
                        color: "#ffff00",
                        width: 2,
                        type: "solid",
                    },
                    markLine: {
                        data: [
                            { 
                                yAxis: avgOrderAmount, 
                                lineStyle: { color: '#00ff00', type: 'dashed', width: 2 },
                                label: {
                                    formatter: `平均订单金额: ${avgOrderAmount.toFixed(2)}`,
                                    position: 'middle',
                                    color: '#00ff00'
                                }
                            }
                        ]
                    },
                },
            ],
        };

        orderAmountChart.setOption(orderAmountOption);

        // 响应式调整
        window.addEventListener('resize', function () {
            chart.resize();
            profitChart.resize();
            profitPercentChart.resize();
            lossPercentChart.resize();
            consecutiveLossChart.resize();
            orderAmountChart.resize();
        });
    </script>
</body>
</html>
